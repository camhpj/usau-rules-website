<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- motion streaks (disc in flight) -->
  <g stroke="#9b2318" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
    <line x1="1.5" y1="18" x2="6.5" y2="17.5"/>
    <line x1="1" y1="21" x2="7" y2="20.5"/>
    <line x1="2" y1="24" x2="7" y2="23.5"/>
  </g>
  <!-- tilted disc -->
  <g transform="rotate(-18 18 16)">
    <!-- underside rim (gives it a lip / depth) -->
    <ellipse cx="18" cy="18.5" rx="12" ry="6" fill="#9b2318"/>
    <!-- top surface -->
    <ellipse cx="18" cy="15.5" rx="12" ry="6" fill="#e74c3c"/>
    <!-- concave inner ring -->
    <ellipse cx="18" cy="15.5" rx="7.5" ry="3.6" fill="none" stroke="#c0392b" stroke-width="1.6"/>
    <!-- gloss along the leading edge -->
    <path d="M8 13.8 A12 6 0 0 1 28 13.8" fill="none" stroke="#ff9d92" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
  </g>
</svg>
